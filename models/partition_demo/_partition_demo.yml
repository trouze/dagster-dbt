version: 2

sources:
  - name: partition_demo
    database: RAW
    schema: trouze
    tables:
      - name: inbound_file_orders_{{ var("partition_id") }}
        columns:
          - name: order_id
            data_tests:
              - not_null
          - name: customer_id
            data_tests:
              - not_null
          - name: file_id
            data_tests:
              - not_null

models:
  - name: file_orders_stage
    config:
      tags:
        - name_address_models
    description: >
      Incrementally staged orders filtered by partition (file_id).
      Each dbt invocation processes a single file by passing
      --vars '{"partition_id": "file_xxx"}'.
      Assertions are evaluated inline and stored in the exceptions column.
    columns:
      - name: order_id
        data_tests:
          - not_null
      - name: exceptions
        config:
          meta:
            assertions:
              __not_null__:
                - order_id
                - customer_id
                - store_id
              order_total_positive:
                description: "Order total must be greater than zero."
                expression: "order_total > 0"
              totals_reconcile:
                description: "Order total must equal subtotal + tax."
                expression: "order_total = subtotal + tax_paid"

  - name: file_orders_rejects
    config:
      tags:
        - name_address_models
    description: >
      Rejected rows that failed one or more assertions in the stage layer.
      Retains the exceptions column for audit and investigation.

  - name: file_orders_refined
    config:
      tags:
        - name_address_models
    description: >
      Clean rows that passed all assertions. This is the table downstream
      consumers should reference — it is partition-unaware and always
      contains the full set of validated records.
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null

  - name: hygiene_results
    config:
      tags:
        - name_address_models
    description: >
      Append-only log of external hygiene API results. First dbt build
      creates the table; Dagster INSERTs raw API responses with an
      inserted_at timestamp. Multiple rows per customer_id are expected —
      name_address deduplicates to the latest result per customer.
    columns:
      - name: customer_id
        data_tests:
          - not_null
      - name: inserted_at
        description: >
          Timestamp of when Dagster inserted this hygiene result batch.
          Used by name_address to incrementally pick up only new results.

  - name: name_address
    config:
      tags:
        - name_address_models
    description: >
      Terminal address table built by merging hygiene_results with refined
      order data. Dagster triggers this model after writing to
      hygiene_results. Uses inserted_at from hygiene_results for
      incremental filtering — only new results since the last run are
      processed. Deduplicates to the latest hygiene result per customer.
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null
      - name: last_hygiene_date
        data_tests:
          - not_null
      - name: inserted_at
        description: >
          Carried through from hygiene_results. Tracks when the latest
          hygiene result was loaded; used as the incremental high-water mark.

groups:
  - name: acxiom_demo
    owner:
      name: Tyler Rouze
      email: tyler.rouze@dbtlabs.com
